<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="chat-container">
    <h2>🤖 Election Chatbot</h2>

    <!-- INFO -->
    <div class="info">
        💡 Try asking:
        <br>👉 vote
        <br>👉 voting
        <br>👉 timeline
        <br>👉 eligibility
        <br>👉 age
    </div>

    <!-- QUICK BUTTONS -->
    <div class="quick-buttons">
        <button onclick="askQuick('vote')">Vote</button>
        <button onclick="askQuick('timeline')">Timeline</button>
        <button onclick="askQuick('eligibility')">Eligibility</button>
    </div>

    <!-- CHAT -->
    <div id="chat-box"></div>

    <!-- INPUT -->
    <div class="input-area">
        <input type="text" id="question" placeholder="Ask something...">
        <button onclick="ask()">Send</button>
    </div>
</div>

<script src="/js/app.js"></script>

</body>
</html>
